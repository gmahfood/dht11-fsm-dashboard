; PlatformIO Project Configuration
; Embedded Sensor Dashboard — Arduino Uno R3
; =============================================

[env:uno]
platform  = atmelavr
board     = uno
framework = arduino

; C++17 for modern features
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter

; Serial monitor baud rate (must match your Serial.begin() call)
monitor_speed = 9600

; Library dependencies (PlatformIO will auto-download these)
lib_deps =
    adafruit/DHT sensor library
    adafruit/Adafruit Unified Sensor
    marcoschwartz/LiquidCrystal_I2C
